<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/eel.js"></script>
</head>
<body>
    <div class="player">
        <div class="cover">
            <i class="fas fa-music"></i>
        </div>
        <div class="song-info">
            <h2 id="song-name">no songs</h2>
            <p id="counter">0 / 0</p>
        </div>
        <div class="controls">
            <button onclick="prevSong()" class="control-btn">
                <i class="fas fa-backward-step"></i>
            </button>
            <button onclick="togglePlay()" id="playBtn" class="play-btn">
                <i class="fas fa-play"></i>
            </button>
            <button onclick="nextSong()" class="control-btn">
                <i class="fas fa-forward-step"></i>
            </button>
        </div>
        <div class="volume">
            <i class="fas fa-volume-down volume-icon"></i>
            <input type="range" id="volume" min="0" max="100" value="70">
            <i class="fas fa-volume-up volume-icon"></i>
        </div>
        <div class="playlist">
            <h3><i class="fas fa-list"></i> songs</h3>
            <ul id="playlist"></ul>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
